version: '3.8'

services:
  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - RATE_LIMIT=30
      - RATE_DURATION=1m
      - CACHE_TTL=24h
      - REQUEST_TIMEOUT=10s
      - DATABASE_URL=postgres://calorie:calorie@postgres:5432/calorie?sslmode=disable
      # Опциональные API ключи
      - USDA_API_KEY=${USDA_API_KEY}
      - EDAMAM_APP_ID=${EDAMAM_APP_ID}
      - EDAMAM_APP_KEY=${EDAMAM_APP_KEY}
    depends_on:
      - redis
      - postgres
    networks:
      - calorie-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=calorie
      - POSTGRES_PASSWORD=calorie
      - POSTGRES_DB=calorie
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - calorie-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - calorie-network

  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus-data:/prometheus
  #   networks:
  #     - calorie-network

  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   networks:
  #     - calorie-network

networks:
  calorie-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
